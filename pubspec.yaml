name: smart_self_printer
description: Smart Self Printer - Self-service print ordering application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  dio: ^5.7.0
  http: ^1.2.2
  file_picker: ^10.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  lottie: ^3.1.3
  responsive_framework: ^1.5.1
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  intl: ^0.19.0
  equatable: ^2.0.7
  uuid: ^4.5.1
  logger: ^2.5.0
  connectivity_plus: ^6.1.1
  package_info_plus: ^8.1.2
  device_info_plus: ^11.3.0
  animate_do: ^3.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/icons/
    - assets/images/

